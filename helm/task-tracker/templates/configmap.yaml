apiVersion: v1
kind: ConfigMap
metadata:
  name: task-tracker-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "task-tracker.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  BACKEND_PORT: {{ .Values.backend.port | quote }}
  FRONTEND_PORT: {{ .Values.frontend.port | quote }}
  JWT_ACCESS_EXPIRES_IN: {{ .Values.backend.jwtAccessExpiresIn | quote }}
  # Backend is reachable within the cluster via its Service name
  BACKEND_INTERNAL_URL: "http://backend:{{ .Values.backend.port }}"
  FRONTEND_ORIGIN: "http://{{ .Values.ingress.host }}"
  # No TLS in minikube — cookies must not have Secure flag
  COOKIE_SECURE: "false"
