apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "task-tracker.labels" . | nindent 4 }}
    {{- include "task-tracker.selectorLabels" (dict "component" "frontend") | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "task-tracker.selectorLabels" (dict "component" "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "task-tracker.selectorLabels" (dict "component" "frontend") | nindent 8 }}
    spec:
      # Frontend depends on backend being available (middleware calls backend
      # /auth/refresh on every request). Wait for the backend Service.
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for backend:{{ .Values.backend.port }}..."
              until nc -z backend {{ .Values.backend.port }}; do
                sleep 2
              done
              echo "Backend is ready"
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          imagePullPolicy: {{ .Values.frontend.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
          envFrom:
            - configMapRef:
                name: task-tracker-config
          env:
            - name: PORT
              value: {{ .Values.frontend.port | quote }}
            - name: HOSTNAME
              value: "0.0.0.0"
            # Client-side env vars (baked at build time, overridden at runtime)
            - name: NEXT_PUBLIC_API_URL
              value: "http://{{ .Values.ingress.host }}/api"
            - name: NEXT_PUBLIC_WS_URL
              value: "http://{{ .Values.ingress.host }}"
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 15
            periodSeconds: 15
