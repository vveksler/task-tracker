apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "task-tracker.labels" . | nindent 4 }}
    {{- include "task-tracker.selectorLabels" (dict "component" "backend") | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "task-tracker.selectorLabels" (dict "component" "backend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "task-tracker.selectorLabels" (dict "component" "backend") | nindent 8 }}
    spec:
      # Two-phase init: first wait for Postgres TCP, then verify the schema
      # exists (i.e. migrations have completed). Without the second check,
      # the backend could become Ready and receive traffic before the
      # migrate-job (post-install hook) finishes — causing "relation does
      # not exist" errors on first deploy to a clean cluster.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres TCP..."
              until nc -z postgres 5432; do
                sleep 2
              done
              echo "Postgres TCP is ready"
        - name: wait-for-migrations
          image: {{ .Values.backend.image }}
          imagePullPolicy: {{ .Values.backend.imagePullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for migrations (checking _prisma_migrations table)..."
              until npx prisma migrate status 2>&1 | grep -q "Database schema is up to date"; do
                echo "Schema not ready yet, waiting..."
                sleep 3
              done
              echo "Migrations are complete"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: task-tracker-secret
                  key: DATABASE_URL
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          imagePullPolicy: {{ .Values.backend.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          envFrom:
            - configMapRef:
                name: task-tracker-config
            - secretRef:
                name: task-tracker-secret
          env:
            - name: PORT
              value: {{ .Values.backend.port | quote }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
