name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Backend: lint, type-check, unit tests ──
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tracker
          POSTGRES_PASSWORD: tracker
          POSTGRES_DB: task_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tracker -d task_tracker_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://tracker:tracker@localhost:5432/task_tracker_test?schema=public
      JWT_ACCESS_SECRET: ci-test-secret
      JWT_ACCESS_EXPIRES_IN: 15m

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint -- --max-warnings 0

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --ci --coverage

  # ── Frontend: lint, type-check, unit tests ──
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --ci --coverage

  # ── Docker: verify both images build successfully ──
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t task-tracker-backend:ci ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:3001 \
            --build-arg NEXT_PUBLIC_WS_URL=http://localhost:3001 \
            -t task-tracker-frontend:ci ./frontend
