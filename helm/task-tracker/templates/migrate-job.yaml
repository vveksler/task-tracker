apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-{{ now | date "20060102150405" }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "task-tracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Runs after all main resources (including Postgres StatefulSet) are applied.
    # pre-install would deadlock because Postgres doesn't exist yet.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      # Wait for Postgres to accept connections before running migrations
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres:5432..."
              until nc -z postgres 5432; do
                sleep 2
              done
              echo "Postgres is ready"
      containers:
        - name: migrate
          image: {{ .Values.backend.image }}
          imagePullPolicy: {{ .Values.backend.imagePullPolicy }}
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: task-tracker-secret
                  key: DATABASE_URL
